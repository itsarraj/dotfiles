general {
    colors = true
    interval = 5
    output_format = "i3bar"
}

order += "disk /"
order += "memory"
order += "cpu_usage"
order += "load"
order += "battery all"
order += "volume master"
order += "wireless _first_"
order += "ethernet _first_"
order += "tztime local"

disk "/" {
    format = "DISK %avail"
    low_threshold = 10
    threshold_type = "percentage_avail"
}

memory {
    format = "MEM %used / %total"
    threshold_degraded = "75%"
    threshold_critical = "90%"
}

cpu_usage {
    format = "CPU %usage"
}

load {
    format = "LOAD %1min"
    max_threshold = "5"
}

battery all {
    format = "BAT %percentage %status %remaining"
    format_down = "BAT missing"
    low_threshold = 15
    threshold_type = "percentage"
}

volume master {
    format = "VOL %volume"
    format_muted = "VOL muted"
    device = "pulse"
}

wireless _first_ {
    format_up = "WIFI %essid %quality"
    format_down = ""
}

ethernet _first_ {
    format_up = "ETH %ip"
    format_down = ""
}

tztime local {
    format = "%Y-%m-%d %H:%M"
}
